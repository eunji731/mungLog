server:
  forward-headers-strategy: native

spring:
  application:
    name: munglog-backend
  config:
    import:
      - optional:file:.env.dev[.properties]
  profiles:
    active: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: ${SHOW_SQL:true}

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  storage:
    type: ${STORAGE_TYPE:local}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  base-url: ${BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  cookie:
    secure: ${COOKIE_SECURE:false}
    domain: ${COOKIE_DOMAIN:}
  upload:
    base-path: ${UPLOAD_BASE_PATH:D:/uploads}
    daily-path: ${app.upload.base-path}/daily
    profile-path: ${app.upload.base-path}/profiles
    files-path: ${app.upload.base-path}/files
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_REGION:ap-northeast-2}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash
  url: https://generativelanguage.googleapis.com/v1beta
